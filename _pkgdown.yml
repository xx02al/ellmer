url: https://ellmer.tidyverse.org
template:
  bootstrap: 5
  package: tidytemplate
  includes:
    in_header: |
      <script src="https://cdn.jsdelivr.net/gh/posit-dev/supported-by-posit/js/badge.min.js" data-max-height="43" data-light-bg="#666f76" data-light-fg="#f9f9f9"></script>
      <!-- Privacy-friendly analytics by Plausible -->
      <script async src="https://plausible.io/js/pa-lmXWrcHEOlmbr6pnO-yL-.js"></script>
      <script>
        window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
        plausible.init()
      </script>

development:
  mode: auto

reference:
- title: Chatbots
  desc: >
    ellmer provides a simple interface to a wide range of LLM providers. Use
    the `chat_` functions to initialize a `Chat` object for a specific
    provider and model. Once created, use the methods of the `Chat` object
    to send messages, receive responses, manage tools and extract structured
    data.
  contents:
  - chat
  - Chat
  - token_usage

- subtitle: Official providers
  desc: >
    Actively maintained, with priority support for bug fixes and new features.
  contents:
  - chat_anthropic
  - chat_aws_bedrock
  - chat_azure_openai
  - chat_databricks
  - chat_deepseek
  - chat_github
  - chat_google_gemini
  - chat_ollama
  - chat_openai
  - chat_posit
  - chat_snowflake

- subtitle: Community providers
  desc: >
    Community contributed and maintained. Contributions to improve these
    providers are especially welcome.
  contents:
  - chat_cloudflare
  - chat_groq
  - chat_huggingface
  - chat_lmstudio
  - chat_mistral
  - chat_openai_compatible
  - chat_openrouter
  - chat_perplexity
  - chat_portkey
  - chat_vllm

- subtitle: Provider-specific helpers
  contents:
  - google_upload
  - starts_with("claude_file")
  - claude_tool_web_search
  - claude_tool_web_fetch
  - google_tool_web_search
  - google_tool_web_fetch
  - openai_tool_web_search

- title: Chat helpers
  contents:
  - create_tool_def
  - content_image_url
  - content_pdf_url
  - starts_with("live_")
  - interpolate
  - stream_controller

- title: Parallel and batch chat
  contents:
  - batch_chat
  - parallel_chat

- title: Tools and structured data
  contents:
  - tool
  - tool_annotations
  - tool_reject
  - type_boolean

- title: Objects
  desc: >
    These classes abstract away behaviour differences in chat providers so
    that for typical ellmer use you don't need to worry about them. You'll need
    to learn more about the objects if you're doing something that's only
    supported by one provider, or if you're implementing a new provider.
  contents:
  - Provider
  - Turn
  - Content
  - Type

- title: Utilities
  contents:
  - contents_text
  - contents_record
  - df_schema
  - params


