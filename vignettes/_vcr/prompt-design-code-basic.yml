        Computing Mean and Median Grouped by Age and Sex\n\n## Sample Data Setup\n\n```python\nimport
        pandas as pd\nimport numpy as np\n\n# Create sample data\nnp.random.seed(42)\nn
        = 1000\n\ndf = pd.DataFrame({\n    ''age'': np.random.randint(18, 65, n),\n    ''sex'':
        np.random.choice([''M'', ''F''], n),\n    **{chr(i): np.random.randn(n) for
        i in range(ord(''a''), ord(''z'')+1)}  # columns a-z\n})\n```\n\n---\n\n##
        Method 1: Using `groupby` + `agg` ✅ Recommended\n\n```python\n# Define variable
        columns\nvar_cols = [chr(i) for i in range(ord(''a''), ord(''z'')+1)]  # [''a'',
        ''b'', ..., ''z'']\n\n# Compute mean and median\nresult = (\n    df\n    .groupby([''age'',
        ''sex''])[var_cols]\n    .agg([''mean'', ''median''])\n)\n\nprint(result.head())\n```\n\n---\n\n##
        Method 2: Separate Mean and Median DataFrames\n\n```python\ngroup_mean   =
        df.groupby([''age'', ''sex''])[var_cols].mean()\ngroup_median = df.groupby([''age'',
        ''sex''])[var_cols].median()\n\nprint(\"Means:\")\nprint(group_mean.head())\n\nprint(\"\\nMedians:\")\nprint(group_median.head())\n```\n\n---\n\n##
        Method 3: Long Format (Tidy) Output\n\n```python\nresult_long = (\n    df\n    .groupby([''age'',
        ''sex''])[var_cols]\n    .agg([''mean'', ''median''])\n    .stack(level=0)              #
        unpivot variable columns\n    .reset_index()\n    .rename(columns={''level_2'':
        ''variable''})\n)\n\nprint(result_long.head(10))\n```\n\n```\n   age sex variable      mean    median\n0   18   F        a  0.123456  0.112233\n1   18   F        b
        -0.234567 -0.221100\n...\n```\n\n---\n\n## Method 4: Custom Aggregation with
        Named Functions\n\n```python\nresult = (\n    df\n    .groupby([''age'', ''sex''])[var_cols]\n    .agg(\n        **{f''{col}_mean'':   (col,
        ''mean'')   for col in var_cols},\n        **{f''{col}_median'': (col, ''median'')
        for col in var_cols}\n    )\n)\n\nprint(result.head())\n# Columns: a_mean,
        a_median, b_mean, b_median, ...\n```\n\n---\n\n## Flattening Multi-Level Column
        Names\n\n```python\nresult = df.groupby([''age'', ''sex''])[var_cols].agg([''mean'',
        ''median''])\n\n# Flatten columns: (''a'', ''mean'') -> ''a_mean''\nresult.columns
        = [''_''.join(col) for col in result.columns]\nresult = result.reset_index()\n\nprint(result.columns.tolist())\n#
        [''age'', ''sex'', ''a_mean'', ''a_median'', ''b_mean'', ''b_median'', ...]\n```\n\n---\n\n##
        Summary\n\n| Method | Best For |\n|--------|----------|\n| `agg([''mean'',
