        Star Wars films (static HTML)\n\nSource: [`vignettes/starwars.Rmd`](https://github.com/tidyverse/rvest/blob/main/vignettes/starwars.Rmd)\n\n`starwars.Rmd`\n\nThis
        vignette contains some data about the Star Wars films for use in\nrvest examples
        and vignettes.\n\n## The Phantom Menace\n\nReleased: 1999-05-19\n\nDirector:
        George Lucas\n\nTurmoil has engulfed the Galactic Republic. The taxation of
        trade routes\nto outlying star systems is in dispute.\n\nHoping to resolve
        the matter with a blockade of deadly battleships, the\ngreedy Trade Federation
        has stopped all shipping to the small planet of\nNaboo.\n\nWhile the Congress
        of the Republic endlessly debates this alarming chain\nof events, the Supreme
        Chancellor has secretly dispatched two Jedi\nKnights, the guardians of peace
        and justice in the galaxy, to settle the\nconflict….\n\n## Attack of the Clones\n\nReleased:
        2002-05-16\n\nDirector: George Lucas\n\nThere is unrest in the Galactic Senate.
        Several thousand solar systems\nhave declared their intentions to leave the
        Republic.\n\nThis separatist movement, under the leadership of the mysterious
        Count\nDooku, has made it difficult for the limited number of Jedi Knights
        to\nmaintain peace and order in the galaxy.\n\nSenator Amidala, the former
        Queen of Naboo, is returning to the Galactic\nSenate to vote on the critical
        issue of creating an ARMY OF THE REPUBLIC\nto assist the overwhelmed Jedi….\n\n##
        Revenge of the Sith\n\nReleased: 2005-05-19\n\nDirector: George Lucas\n\nWar!
        The Republic is crumbling under attacks by the ruthless Sith Lord,\nCount
        Dooku. There are heroes on both sides. Evil is everywhere.\n\nIn a stunning
        move, the fiendish droid leader, General Grievous, has\nswept into the Republic
        capital and kidnapped Chancellor Palpatine,\nleader of the Galactic Senate.\n\nAs
        the Separatist Droid Army attempts to flee the besieged capital with\ntheir
        valuable hostage, two Jedi Knights lead a desperate mission to\nrescue the
        captive Chancellor….\n\n## A New Hope\n\nReleased: 1977-05-25\n\nDirector:
        George Lucas\n\nIt is a period of civil war. Rebel spaceships, striking from
        a hidden\nbase, have won their first victory against the evil Galactic Empire.\n\nDuring
        the battle, Rebel spies managed to steal secret plans to the\nEmpire’s ultimate
        weapon, the DEATH STAR, an armored space station with\nenough power to destroy
        an entire planet.\n\nPursued by the Empire’s sinister agents, Princess Leia
        races home aboard\nher starship, custodian of the stolen plans that can save
        her people and\nrestore freedom to the galaxy….\n\n## The Empire Strikes Back\n\nReleased:
        1980-05-17\n\nDirector: Irvin Kershner\n\nIt is a dark time for the Rebellion.
        Although the Death Star has been\ndestroyed, Imperial troops have driven the
        Rebel forces from their\nhidden base and pursued them across the galaxy.\n\nEvading
        the dreaded Imperial Starfleet, a group of freedom fighters led\nby Luke Skywalker
        has established a new secret base on the remote ice\nworld of Hoth.\n\nThe
        evil lord Darth Vader, obsessed with finding young Skywalker, has\ndispatched
        thousands of remote probes into the far reaches of space….\n\n## Return of
        the Jedi\n\nReleased: 1983-05-25\n\nDirector: Richard Marquand\n\nLuke Skywalker
        has returned to his home planet of Tatooine in an attempt\nto rescue his friend
        Han Solo from the clutches of the vile gangster\nJabba the Hutt.\n\nLittle
        does Luke know that the GALACTIC EMPIRE has secretly begun\nconstruction on
        a new armored space station even more powerful than the\nfirst dreaded Death
        Star.\n\nWhen completed, this ultimate weapon will spell certain doom for
        the\nsmall band of rebels struggling to restore freedom to the galaxy…\n\n##
        The Force Awakens\n\nReleased: 2015-12-11\n\nDirector: J. J. Abrams\n\nLuke
        Skywalker has vanished. In his absence, the sinister FIRST ORDER\nhas risen
        from the ashes of the Empire and will not rest until\nSkywalker, the last
        Jedi, has been destroyed. With the support of the\nREPUBLIC, General Leia
        Organa leads a brave RESISTANCE. She is desperate\nto find her brother Luke
        and gain his help in restoring peace and\njustice to the galaxy. Leia has
        sent her most daring pilot on a secret\nmission to Jakku, where an old ally
        has discovered a clue to Luke’s\nwhereabouts….\n\n## On this page\n\nDeveloped
        by [Hadley Wickham](https://hadley.nz), [![Posit](https://www.tidyverse.org/posit-logo.svg)](https://www.posit.co).\n\nSite
        built with [pkgdown](https://pkgdown.r-lib.org/) 2.1.3."},"title":"Star Wars
