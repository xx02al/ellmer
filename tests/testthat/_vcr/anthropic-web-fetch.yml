        first movie listed on the page is **The Phantom Menace**, released on 1999-05-19
        and directed by George Lucas."}],"stop_reason":"end_turn","stop_sequence":null,"stop_details":null,"usage":{"input_tokens":4,"cache_creation_input_tokens":2832,"cache_read_input_tokens":1053,"cache_creation":{"ephemeral_5m_input_tokens":2832,"ephemeral_1h_input_tokens":0},"output_tokens":107,"service_tier":"standard","inference_geo":"global","server_tool_use":{"web_search_requests":0,"web_fetch_requests":1}}}'
